<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>魔方训练助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #7c3aed;
  --primary-light: #ede9fe;
  --accent: #ec4899;
  --success: #10b981;
  --success-light: #d1fae5;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --danger: #ef4444;
  --bg: #f5f3ff;
  --card: #ffffff;
  --text: #1e1b4b;
  --text2: #6b7280;
  --border: #e5e7eb;
  --radius: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --tab-h: 64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: calc(var(--tab-h) + var(--safe-b) + 16px);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ---- Auth Overlay ---- */
.auth-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.auth-card {
  background: #fff; border-radius: 20px; padding: 32px 24px 24px;
  width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.auth-card h2 { text-align: center; font-size: 1.3rem; margin-bottom: 4px; }
.auth-card .auth-sub { text-align: center; color: var(--text2); font-size: .8rem; margin-bottom: 20px; }
.auth-card .field { margin-bottom: 14px; }
.auth-card label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.auth-card input[type="text"],
.auth-card input[type="password"] {
  width: 100%; padding: 12px 14px; border: 2px solid var(--border);
  border-radius: 12px; font-size: 1rem; font-family: inherit;
  transition: border-color .2s; -webkit-appearance: none;
}
.auth-card input:focus { outline: none; border-color: var(--primary); }
.auth-card .auth-error { color: var(--danger); font-size: .8rem; text-align: center; min-height: 20px; margin-bottom: 8px; }
.auth-card .auth-switch { text-align: center; font-size: .8rem; color: var(--text2); margin-top: 14px; }
.auth-card .auth-switch a { color: var(--primary); font-weight: 600; cursor: pointer; }

/* ---- Loading ---- */
.loading-screen { display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 80px 24px; }
.loading-screen .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
.header {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff; padding: 16px 20px 20px; position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 12px rgba(124,58,237,.3);
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.2rem; font-weight: 700; }
.header .user-area { display: flex; align-items: center; gap: 8px; font-size: .8rem; }
.header .user-area .logout-btn { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 5px 12px; border-radius: 12px; cursor: pointer; font-size: .75rem; font-weight: 600; }
.header .sub { font-size: .75rem; opacity: .85; margin-top: 2px; }

.container { max-width: 500px; margin: 0 auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-b)); padding-bottom: var(--safe-b);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 20; box-shadow: 0 -2px 10px rgba(0,0,0,.05);
}
.bottom-nav button {
  flex: 1; border: none; background: none;
  font-size: .7rem; color: var(--text2);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; cursor: pointer; transition: color .2s;
}
.bottom-nav button .ico { font-size: 1.4rem; }
.bottom-nav button.active { color: var(--primary); font-weight: 600; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.card h3 { font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

/* Badges */
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
.badge-mastered { background: var(--success-light); color: #065f46; }
.badge-learning { background: var(--warning-light); color: #92400e; }
.badge-new { background: var(--primary-light); color: #5b21b6; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 24px; border: none; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:active { background: #6d28d9; transform: scale(.97); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:active { background: #059669; transform: scale(.97); }
.btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:active { background: var(--primary-light); }
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: .5; pointer-events: none; }

/* Training sections */
.train-section { background: #faf9ff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
.train-section.rest { border-left-color: var(--accent); background: #fdf2f8; }
.train-section.free { border-left-color: var(--success); background: #ecfdf5; }
.train-section .ts-title { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
.train-section .ts-time { font-size: .75rem; color: var(--text2); margin-bottom: 6px; }
.train-section .ts-item { font-size: .85rem; padding: 2px 0; padding-left: 12px; position: relative; }
.train-section .ts-item::before { content: "·"; position: absolute; left: 0; font-weight: 700; color: var(--primary); }

/* Formula card */
.formula-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.formula-info { flex: 1; min-width: 0; }
.formula-info .f-name { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
.formula-info .f-not { font-family: "SF Mono","Menlo","Consolas",monospace; font-size: .85rem; background: #f4f0ff; padding: 6px 10px; border-radius: 8px; word-break: break-all; letter-spacing: .04em; line-height: 1.5; }
.formula-card .f-status { flex-shrink: 0; }

/* Week selector */
.week-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
.week-tab { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: 2px solid var(--border); background: #fff; font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
.week-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Timer */
.timer-display { text-align: center; padding: 24px 0; }
.timer-display .time { font-size: 3.8rem; font-weight: 800; font-variant-numeric: tabular-nums; font-family: "SF Mono","Menlo","Consolas",monospace; letter-spacing: .02em; }
.timer-display .time.warning { color: var(--warning); }
.timer-display .time.danger { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

.timer-presets { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.timer-presets button { padding: 8px 20px; border-radius: 20px; border: 2px solid var(--border); background: #fff; font-size: .85rem; cursor: pointer; font-weight: 600; transition: all .2s; }
.timer-presets button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.timer-controls { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }

.stopwatch-display { text-align: center; padding: 16px 0; }
.stopwatch-display .sw-time { font-size: 3rem; font-weight: 800; font-variant-numeric: tabular-nums; font-family: "SF Mono","Menlo","Consolas",monospace; }

/* Time list */
.time-list { margin-top: 12px; }
.time-list .tl-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #fff; border-radius: 10px; margin-bottom: 6px; font-size: .85rem; }
.time-list .tl-best { color: var(--success); font-weight: 700; }
.time-stats { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.time-stat { flex: 1; min-width: 90px; text-align: center; background: #fff; border-radius: 12px; padding: 12px 8px; box-shadow: var(--shadow); }
.time-stat .ts-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
.time-stat .ts-lbl { font-size: .7rem; color: var(--text2); margin-top: 2px; }

/* Settings */
.settings-bar { display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow); font-size: .85rem; flex-wrap: wrap; gap: 8px; }
.settings-bar input[type="date"] { border: 2px solid var(--border); border-radius: 10px; padding: 6px 10px; font-size: .85rem; font-family: inherit; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: #fff; padding: 10px 24px; border-radius: 24px; font-size: .85rem; font-weight: 600; z-index: 100; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

.celebration { text-align: center; padding: 40px 20px; }
.celebration .big-emoji { font-size: 5rem; }
.celebration h2 { font-size: 1.5rem; margin: 16px 0 8px; }

.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-bar .fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s ease; }
.rest-day-card { text-align: center; }
</style>
</head>
<body>

<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay" style="display:none;">
  <div class="auth-card">
    <h2>魔方训练助手</h2>
    <p class="auth-sub">登录以记录你的训练进度</p>
    <div class="auth-error" id="authError"></div>
    <!-- Login Form -->
    <form id="loginForm" onsubmit="return doLogin()">
      <div class="field"><label>用户名</label><input type="text" id="loginUser" autocomplete="username" placeholder="输入用户名"></div>
      <div class="field"><label>密码</label><input type="password" id="loginPass" autocomplete="current-password" placeholder="输入密码"></div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登 录</button>
    </form>
    <!-- Register Form -->
    <form id="registerForm" style="display:none;" onsubmit="return doRegister()">
      <div class="field"><label>用户名</label><input type="text" id="regUser" autocomplete="username" placeholder="2-20个字符"></div>
      <div class="field"><label>密码</label><input type="password" id="regPass" autocomplete="new-password" placeholder="至少3个字符"></div>
      <button type="submit" class="btn btn-success btn-block" id="regBtn">注 册</button>
    </form>
    <div class="auth-switch" id="authSwitch">没有账号？<a onclick="showRegister()">立即注册</a></div>
  </div>
</div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div style="color:var(--text2);">加载中...</div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div class="header-row">
      <h1>魔方训练助手</h1>
      <div class="user-area">
        <span id="headerUser"></span>
        <button class="logout-btn" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="sub" id="headerSub">CFOP 30天提速计划</div>
  </div>
  <div class="container">
    <div class="tab-content active" id="tab-today"></div>
    <div class="tab-content" id="tab-plan"></div>
    <div class="tab-content" id="tab-formulas"></div>
    <div class="tab-content" id="tab-timer"></div>
  </div>
  <nav class="bottom-nav">
    <button class="active" data-tab="today"><span class="ico">📅</span>今日</button>
    <button data-tab="plan"><span class="ico">📋</span>计划</button>
    <button data-tab="formulas"><span class="ico">📖</span>公式</button>
    <button data-tab="timer"><span class="ico">⏱️</span>计时</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

// ==================== STATE ====================

const STORAGE_KEY = 'cube_trainer_offline';
let state = defaultState();
let currentUser = null;

function defaultState() {
  return {
    startDate: '',
    mastered: { oll21: true, oll22: true, pll_cw: true },
    completedDays: {},
    solveTimes: [],
  };
}

// ==================== API ====================

async function api(path, options = {}) {
  try {
    const res = await fetch(path, {
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '请求失败');
    return data;
  } catch (e) {
    if (e.message === 'Failed to fetch') throw new Error('网络连接失败');
    throw e;
  }
}

async function loadState() {
  try {
    const data = await api('/api/state');
    if (data.state && Object.keys(data.state).length > 0) {
      state = { ...defaultState(), ...data.state };
      return;
    }
  } catch (e) {
    // fallback to localStorage
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { state = { ...defaultState(), ...JSON.parse(raw) }; return; }
    } catch (_) {}
  }
  state = defaultState();
}

async function saveState() {
  // Save via API
  try {
    await api('/api/state', { method: 'PUT', body: JSON.stringify({ state }) });
  } catch (_) {}
  // Also save local backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
}

// ==================== AUTH ====================

async function checkAuth() {
  try {
    const data = await api('/api/auth/me');
    if (data.logged_in) {
      currentUser = data.username;
      document.getElementById('headerUser').textContent = '👤 ' + currentUser;
      return true;
    }
  } catch (_) {}
  return false;
}

function showLogin() {
  document.getElementById('loginForm').style.display = '';
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('authSwitch').innerHTML = '没有账号？<a onclick="showRegister()">立即注册</a>';
  document.getElementById('authError').textContent = '';
  document.getElementById('authOverlay').style.display = '';
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
}

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = '';
  document.getElementById('authSwitch').innerHTML = '已有账号？<a onclick="showLogin()">返回登录</a>';
  document.getElementById('authError').textContent = '';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { document.getElementById('authError').textContent = '请填写完整'; return false; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';
  document.getElementById('authError').textContent = '';

  try {
    const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    currentUser = data.username;
    document.getElementById('headerUser').textContent = '👤 ' + currentUser;
    await loadState();
    hideAuth();
    renderAll();
  } catch (e) {
    document.getElementById('authError').textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
  return false;
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username || !password) { document.getElementById('authError').textContent = '请填写完整'; return false; }
  if (username.length < 2) { document.getElementById('authError').textContent = '用户名至少2个字符'; return false; }
  if (password.length < 3) { document.getElementById('authError').textContent = '密码至少3个字符'; return false; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';
  document.getElementById('authError').textContent = '';

  try {
    const data = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ username, password }) });
    currentUser = data.username;
    document.getElementById('headerUser').textContent = '👤 ' + currentUser;
    await loadState();
    hideAuth();
    renderAll();
  } catch (e) {
    document.getElementById('authError').textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
  return false;
}

async function doLogout() {
  try { await api('/api/auth/logout', { method: 'POST' }); } catch (_) {}
  currentUser = null;
  state = defaultState();
  showLogin();
}

function hideAuth() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = '';
}

// ==================== HELPERS ====================

function getToday() { return new Date().toISOString().slice(0, 10); }

function getTrainingDayIndex(todayStr) {
  if (!state.startDate) return -1;
  const start = new Date(state.startDate + 'T00:00:00');
  const today = new Date(todayStr + 'T00:00:00');
  const diff = Math.floor((today - start) / 86400000);
  return diff < 0 ? -1 : diff >= 28 ? 28 : diff;
}

function isMastered(formulaId) { return !!state.mastered[formulaId]; }
function formatTime(seconds) {
  const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60), ms = Math.floor((seconds % 1) * 100);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
}
function formatTimeShort(seconds) {
  const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}

function statusBadge(status) {
  if (status === 'mastered') return '<span class="badge badge-mastered">✅ 已掌握</span>';
  if (status === 'learning') return '<span class="badge badge-learning">📖 学习中</span>';
  return '<span class="badge badge-new">🆕 待学</span>';
}

function nextMonday() {
  const d = new Date();
  d.setDate(d.getDate() + ((1 + 7 - d.getDay()) % 7 || 7));
  return d.toISOString().slice(0, 10);
}

    else if (td.type==='free') html+='<p style="color:var(--success);">自由练习日</p>';
    for (const sec of td.sections) html+=`<div class="train-section" style="margin-bottom:6px;"><div class="ts-title">${sec.icon} ${sec.title}</div>${sec.time?`<div class="ts-time">⏱ ${sec.time}</div>`:''}${sec.items.map(i=>`<div class="ts-item">${i}</div>`).join('')}</div>`;

  el.innerHTML = html;
}

// ==================== RENDER: TIMER ====================

let timerMode = 'countdown', countdownTotal = 5 * 60, countdownRemaining = 5 * 60, countdownRunning = false, countdownInterval = null;
let stopwatchRunning = false, stopwatchStart = 0, stopwatchElapsed = 0, stopwatchInterval = null;

function renderTimer() {
  const el = document.getElementById('tab-timer');
  let html = `<div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
    <button class="btn ${timerMode==='countdown'?'btn-primary':'btn-outline'} btn-sm" onclick="switchTimerMode('countdown')">⏲ 倒计时</button>
    <button class="btn ${timerMode==='stopwatch'?'btn-primary':'btn-outline'} btn-sm" onclick="switchTimerMode('stopwatch')">⏱ 秒表</button></div>`;

  if (timerMode === 'countdown') {
    const cls = countdownRemaining<=10?'danger':countdownRemaining<=30?'warning':'';
    html += `<div class="timer-display"><div class="time ${cls}" id="countdownDisplay">${formatTimeShort(countdownRemaining)}</div></div>
      <div class="timer-presets">${[5,10,15].map(m=>`<button class="${countdownTotal===m*60&&!countdownRunning?'active':''}" onclick="setCountdown(${m})" ${countdownRunning?'disabled':''}>${m} 分钟</button>`).join('')}</div>
      <div class="timer-controls">
        <button class="btn btn-outline" onclick="resetCountdown()" style="border-radius:50%;">🔄</button>
        <button class="btn ${countdownRunning?'btn-outline':'btn-primary'}" onclick="toggleCountdown()" style="width:70px;height:70px;border-radius:50%;font-size:1.6rem;">${countdownRunning?'⏸':'▶'}</button></div>`;
  } else {
    const now = stopwatchRunning ? (stopwatchElapsed + (Date.now() - stopwatchStart) / 1000) : stopwatchElapsed;
    html += `<div class="stopwatch-display"><div class="sw-time" id="stopwatchDisplay">${formatTime(now)}</div></div>
      <div class="timer-controls">
        <button class="btn btn-outline" onclick="resetStopwatch()" style="border-radius:50%;">🔄</button>
        <button class="btn ${stopwatchRunning?'btn-outline':'btn-primary'}" onclick="toggleStopwatch()" style="width:70px;height:70px;border-radius:50%;font-size:1.6rem;">${stopwatchRunning?'⏸':'▶'}</button>
        <button class="btn btn-success" onclick="recordSolveTime()" style="border-radius:50%;" ${stopwatchRunning||stopwatchElapsed===0?'disabled':''}>📝</button></div>
      ${renderTimeHistory()}`;
  }
  el.innerHTML = html;
}

function renderTimeHistory() {
  const times = state.solveTimes;
  if (times.length === 0) return '<p style="text-align:center;color:var(--text2);margin-top:16px;">还没有记录成绩</p>';
  const sorted = [...times].sort((a,b)=>a.time-b.time);
  const best = sorted[0].time;
  const last5 = times.slice(-5), last12 = times.slice(-12);
  const avg5 = last5.length>0?last5.reduce((s,t)=>s+t.time,0)/last5.length:0;
  const avg12 = last12.length>0?last12.reduce((s,t)=>s+t.time,0)/last12.length:0;
  return `<div class="time-stats">
    <div class="time-stat"><div class="ts-val">${formatTime(best)}</div><div class="ts-lbl">最佳成绩</div></div>
    <div class="time-stat"><div class="ts-val">${formatTime(avg5)}</div><div class="ts-lbl">最近5次平均</div></div>
    <div class="time-stat"><div class="ts-val">${formatTime(avg12)}</div><div class="ts-lbl">最近12次平均</div></div></div>
    <div class="time-list" style="margin-top:16px;"><h4 style="margin-bottom:8px;">📋 成绩记录 (${times.length}次)</h4>
    ${times.slice().reverse().slice(0,20).map((t,i)=>`<div class="tl-item"><span>#${times.length-i}</span><span>${t.date}</span><span class="${t.time===best?'tl-best':''}">${formatTime(t.time)}</span><span style="cursor:pointer;color:var(--danger);" onclick="deleteSolveTime(${times.length-1-i})">✕</span></div>`).join('')}</div>`;
}

// ==================== TIMER LOGIC ====================

function switchTimerMode(mode) { timerMode=mode; if(mode==='stopwatch')stopCountdown(); if(mode==='countdown')stopStopwatch(); renderTimer(); }
function setCountdown(m) { countdownTotal=m*60; countdownRemaining=m*60; stopCountdown(); renderTimer(); }
function toggleCountdown() { countdownRunning?stopCountdown():startCountdown(); renderTimer(); }
function startCountdown() {
  if(countdownRemaining<=0)countdownRemaining=countdownTotal;
  countdownRunning=true;
  countdownInterval=setInterval(()=>{
    countdownRemaining--;
    const el=document.getElementById('countdownDisplay'); if(!el)return;
    el.textContent=formatTimeShort(countdownRemaining);
    el.className='time'+(countdownRemaining<=10?' danger':countdownRemaining<=30?' warning':'');
    if(countdownRemaining<=0){stopCountdown();beep();showToast('⏰ 时间到！');renderTimer();}
  },1000);
}
function stopCountdown() { countdownRunning=false; if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;} }
function resetCountdown() { stopCountdown(); countdownRemaining=countdownTotal; renderTimer(); }
function toggleStopwatch() { stopwatchRunning?pauseStopwatch():startStopwatch(); renderTimer(); }
function startStopwatch() {
  stopwatchRunning=true; stopwatchStart=Date.now();
  stopwatchInterval=setInterval(()=>{
    const el=document.getElementById('stopwatchDisplay'); if(!el)return;
    el.textContent=formatTime(stopwatchElapsed+(Date.now()-stopwatchStart)/1000);
  },30);
}
function pauseStopwatch() { stopwatchRunning=false; stopwatchElapsed+=(Date.now()-stopwatchStart)/1000; if(stopwatchInterval){clearInterval(stopwatchInterval);stopwatchInterval=null;} }
function resetStopwatch() { pauseStopwatch(); stopwatchElapsed=0; renderTimer(); }
async function recordSolveTime() {
  const time=Math.round(stopwatchElapsed*100)/100; if(time===0)return;
  state.solveTimes.push({date:getToday(),time}); await saveState();
  stopwatchElapsed=0; renderTimer(); showToast(`✅ 记录成绩：${formatTime(time)}`);
}
async function deleteSolveTime(index) { state.solveTimes.splice(index,1); await saveState(); renderTimer(); }
function beep() { try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=0.3;o.start();o.stop(c.currentTime+0.4);}catch(e){}}

// ==================== ACTIONS ====================

async function setStartDate(dateStr) {
  const date = dateStr || document.getElementById('startDateInput')?.value;
  if (!date) return;
  state.startDate = date;
  await saveState();
  renderAll();
  showToast('✅ 开始日期已设置');
}

async function markMastered(formulaId) {
  state.mastered[formulaId] = true;
  await saveState();
  renderAll();
  showToast('✅ 已掌握！放入掌握库');
}

async function completeDay(dayNum) {
  state.completedDays[dayNum] = true;
  await saveState();
  renderAll();
  showToast('✅ 训练完成！太棒了！');
}

async function undoCompleteDay(dayNum) {
  delete state.completedDays[dayNum];
  await saveState();
  renderAll();
}

async function resetTraining() {
  if (confirm('确定要重新开始训练吗？这会清除所有进度和成绩记录。')) {
    state = defaultState();
    await saveState();
    planWeek = 1; timerMode = 'countdown'; countdownTotal = 5 * 60; countdownRemaining = 5 * 60;
    stopCountdown(); stopStopwatch(); stopwatchElapsed = 0;
    renderAll();
  }
}

// ==================== NAVIGATION ====================

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tabName).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.bottom-nav button[data-tab="${tabName}"]`).classList.add('active');
  if (tabName==='plan') renderPlan();
  if (tabName==='formulas') renderFormulas();
  if (tabName==='timer') renderTimer();
}

function updateHeaderSub(dayIndex) {
  const sub = document.getElementById('headerSub');
  if (dayIndex < 0) sub.textContent = 'CFOP 30天提速计划';
  else if (dayIndex >= 28) sub.textContent = '🎉 训练完成！';
  else { const td = TRAINING_DAYS[dayIndex]; sub.textContent = `第${td.week}周 · 第${td.day}天 · ${td.dur}`; }
}

function renderAll() {
  renderToday();
  if (document.getElementById('tab-plan').classList.contains('active')) renderPlan();
  if (document.getElementById('tab-formulas').classList.contains('active')) renderFormulas();
  if (document.getElementById('tab-timer').classList.contains('active')) renderTimer();
}

// ==================== INIT ====================

document.querySelectorAll('.bottom-nav button').forEach(btn=>{btn.addEventListener('click',()=>switchTab(btn.dataset.tab));});

document.addEventListener('visibilitychange', ()=>{
  if (document.hidden) {
    if (stopwatchRunning) pauseStopwatch();
    if (countdownRunning) stopCountdown();
    renderTimer();
  }
});

async function init() {
  const authed = await checkAuth();
  if (authed) {
    await loadState();
    hideAuth();
    renderAll();
  } else {
    showLogin();
  }
}

init();
</script>
</body>
</html>
